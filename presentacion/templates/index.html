<!DOCTYPE html>
<html>
<head>
    <title>Mi Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>

<header>
    <h1>Mi Blog Personal</h1>
</header>

<div class="container">
    {% for articulo in articulos %}
    <div class="card">
        <h2>{{ articulo.titulo }}</h2>
        <p>{{ articulo.contenido[:100] }}...</p>
        <a href="/articulo/{{ articulo.id }}" class="btn">Leer más</a>
    </div>
    {% endfor %}
</div>

</body>
</html>
