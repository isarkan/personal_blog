<!DOCTYPE html>
<html>
<head>
    <title>Editar Artículo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>

<div class="navbar">
    <a href="/">🏠 Inicio</a>
</div>

<div class="container">

    <a href="/admin" class="btn btn-secondary">⬅ Volver</a>

    <h1>Editar Artículo</h1>

    <form method="POST">
        <label>Título</label>
        <input type="text" name="titulo" value="{{ articulo.titulo }}" required>

        <label>Contenido</label>
        <textarea name="contenido" rows="8" required>{{ articulo.contenido }}</textarea>

        <button type="submit" class="btn">Actualizar</button>
    </form>

</div>

</body>
</html>
